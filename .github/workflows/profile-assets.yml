name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *" # daily (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1) Metrics -> generated/metrics.svg (static, committed to main)
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: captain686
          template: classic
          filename: generated/metrics.svg
          base: header, activity, community, repositories
          config_timezone: Asia/Shanghai

      # 2) Snake -> generated/github-contribution-grid-snake.svg (static, committed to main)
      - name: Generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: captain686
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Copy assets into generated/
        run: |
          set -e
          mkdir -p generated
          cp dist/github-contribution-grid-snake.svg generated/github-contribution-grid-snake.svg

      - name: Commit & push (if changed)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Ensure we're on an up-to-date main branch (avoid non-fast-forward push failures)
          git fetch origin main
          git checkout main
          git pull --rebase origin main

          git add generated/metrics.svg generated/github-contribution-grid-snake.svg
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update generated assets - [Skip GitHub Action]"
          git push origin main
